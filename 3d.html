<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: white;
}
</style>

</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/OBJLoader.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

/* 💡 fény */
scene.add(new THREE.AmbientLight(0xffffff, 1));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

/* 🔴 TESZT KOCKA (fontos debug!) */
const testGeo = new THREE.BoxGeometry();
const testMat = new THREE.MeshNormalMaterial();
const cube = new THREE.Mesh(testGeo, testMat);
scene.add(cube);

/* 📦 OBJ */
const loader = new THREE.OBJLoader();

loader.load(
  "3DModel.obj",
  function (obj) {
    console.log("OBJ betöltve!");

    obj.scale.set(1, 1, 1);
    obj.position.set(0, 0, 0);

    scene.add(obj);
  },
  undefined,
  function (err) {
    console.error("OBJ hiba:", err);
  }
);

camera.position.z = 3;

/* 🔄 loop */
function animate() {
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01; // 🔥 ha ezt látod → 3D OK

  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
