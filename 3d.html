<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D + Galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  overflow-x: hidden;
  overscroll-behavior: none;
}

/* 🟢 3D SZEKCIÓ */
#three-section {
  position: relative;
  height: 100vh;
  height: 100svh;
  overflow: hidden;
}

/* 🎥 canvas */
canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* 🟤 MENÜ */
#menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

  padding: 12px 0;
  text-align: center;

  font-family: Impact, sans-serif;
  font-size: clamp(22px, 5vw, 40px);
  color: #C1900B;

  background: rgba(255,255,255,0.95);

  opacity: 0;
  transform: translateY(-100%);
  transition: 0.4s ease;

  z-index: 9999;
}

#menu.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🖼 GALÉRIA */
#gallery {
  width: 95%;
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 0;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* 📱 TABLET */
@media (max-width: 768px) {
  #gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* 📱 TELEFON */
@media (max-width: 480px) {
  #gallery {
    grid-template-columns: repeat(1, 1fr);
  }
}

/* 🖼 képek */
.image-wrapper {
  position: relative;
  cursor: pointer;
}

.image-wrapper img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

/* 💰 ár */
.price {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);

  font-family: Consolas, monospace;
  font-size: 14px;
  color: #3179ac;

  pointer-events: none;
}
</style>
</head>

<body>

<div id="menu">MENÜ</div>

<div id="three-section"></div>

<!-- 🖼 GALÉRIA -->
<div id="gallery">

  <div class="image-wrapper"><img src="5.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="1.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="9.JPG" onerror="this.parentElement.style.display='none'"></div>

  <div class="image-wrapper"><img src="3.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="12.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="7.JPG" onerror="this.parentElement.style.display='none'"></div>

  <div class="image-wrapper"><img src="14.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="2.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="10.JPG" onerror="this.parentElement.style.display='none'"></div>

  <div class="image-wrapper"><img src="6.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="11.JPG" onerror="this.parentElement.style.display='none'"></div>
  <div class="image-wrapper"><img src="13.JPG" onerror="this.parentElement.style.display='none'"></div>

  <div class="image-wrapper"><img src="4.JPG" onerror="this.parentElement.style.display='none'"></div>

</div>

<!-- 📦 THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

/* 🎥 SCENE */
const section = document.getElementById("three-section");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xffffff);
section.appendChild(renderer.domElement);

/* 💡 fények */
scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

/* 🎮 controls */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.enableZoom = true;
controls.rotateSpeed = 0.5;

/* 📦 modell */
const loader = new THREE.GLTFLoader();
loader.load("3DModel.glb", (gltf) => {
  scene.add(gltf.scene);
});

camera.position.z = 3;

/* 🟤 MENÜ scroll trigger */
const menu = document.getElementById("menu");

window.addEventListener("scroll", () => {
  const bottom = section.getBoundingClientRect().bottom;

  if (bottom <= 0) {
    menu.classList.add("show");
  } else {
    menu.classList.remove("show");
  }
});

/* 🔄 render loop */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* 📱 resize fix */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

/* 💰 random ár */
function randomPrice() {
  const min = 60000;
  const max = 120000;
  const value = Math.floor(Math.random() * (max - min + 1)) + min;
  return value.toLocaleString('hu-HU') + " Ft";
}

/* 🖱 kattintás */
document.querySelectorAll(".image-wrapper").forEach(wrapper => {
  wrapper.addEventListener("click", () => {
    const existing = wrapper.querySelector(".price");

    if (existing) {
      existing.remove();
    } else {
      const price = document.createElement("div");
      price.className = "price";
      price.innerText = randomPrice();
      wrapper.appendChild(price);
    }
  });
});

</script>

</body>
</html>
