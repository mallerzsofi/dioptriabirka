<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>3D + Galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

/* 🟢 3D SZEKCIÓ */
#three-section {
  position: relative;
  height: 100vh;
  background: #ffffff;
  overflow: hidden;
}

/* 🎥 canvas */
canvas {
  display: block;
}

/* 🟤 MENÜ */
#menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

  padding: 15px 0;
  text-align: center;

  font-family: Impact, sans-serif;
  font-size: 40px;
  color: #C1900B;

  background: rgba(255,255,255,0.95);

  opacity: 0;
  transform: translateY(-100%);
  transition: 0.4s ease;

  z-index: 9999;
}

#menu.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🖼 GALÉRIA */
#gallery {
  width: 90%;
  max-width: 1000px;
  margin: 0 auto;
  padding: 50px 0;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* 🔥 wrapper */
.image-wrapper {
  position: relative;
  cursor: pointer;
}

.image-wrapper img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

/* 💰 ár */
.price {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-family: Consolas, monospace;
  font-size: 12px;
  color: #00ff14;

  pointer-events: none;
}
</style>
</head>

<body>

<div id="menu">MENÜ</div>

<div id="three-section"></div>

<!-- 🖼 GALÉRIA -->
<div id="gallery">

  <div class="image-wrapper"><img src="5.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="1.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="9.JPG" onerror="this.style.display='none'"></div>

  <div class="image-wrapper"><img src="3.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="12.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="7.JPG" onerror="this.style.display='none'"></div>

  <div class="image-wrapper"><img src="14.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="2.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="10.JPG" onerror="this.style.display='none'"></div>

  <div class="image-wrapper"><img src="6.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="11.JPG" onerror="this.style.display='none'"></div>
  <div class="image-wrapper"><img src="13.JPG" onerror="this.style.display='none'"></div>

  <div class="image-wrapper"><img src="4.JPG" onerror="this.style.display='none'"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

/* 🎥 3D */
const section = document.getElementById("three-section");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff);
section.appendChild(renderer.domElement);

/* 💡 fény */
scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

/* 🎮 controls */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* 📦 modell */
const loader = new THREE.GLTFLoader();
loader.load("3DModel.obj.glb", (gltf) => {
  scene.add(gltf.scene);
});

camera.position.z = 3;

/* 🟤 MENÜ */
const menu = document.getElementById("menu");

window.addEventListener("scroll", () => {
  const sectionBottom = section.getBoundingClientRect().bottom;

  if (sectionBottom <= 0) {
    menu.classList.add("show");
  } else {
    menu.classList.remove("show");
  }
});

/* 🔄 render */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* 📱 resize */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* 💰 RANDOM ÁR */
function randomPrice() {
  const min = 60000;
  const max = 120000;
  const value = Math.floor(Math.random() * (max - min + 1)) + min;
  return value.toLocaleString('hu-HU') + " Ft";
}

/* 🖱 KATTINTÁS */
document.querySelectorAll(".image-wrapper").forEach(wrapper => {

  wrapper.addEventListener("click", () => {

    const existing = wrapper.querySelector(".price");

    if (existing) {
      existing.remove();
    } else {
      const price = document.createElement("div");
      price.className = "price";
      price.innerText = randomPrice();

      wrapper.appendChild(price);
    }

  });

});

</script>

</body>
</html>
