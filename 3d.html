<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: white;
}
canvas {
  display: block;
}
</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/OBJLoader.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

/* 💡 fény */
scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

/* 📦 OBJ BETÖLTÉS (MTL NÉLKÜL - BIZTOS LÁTHATÓ) */
const loader = new THREE.OBJLoader();

loader.load(
  "3DModel.obj",

  function (object) {

    /* 🔥 minden mesh-hez biztos material */
    object.traverse(function (child) {
      if (child.isMesh) {
        child.material = new THREE.MeshNormalMaterial();
      }
    });

    scene.add(object);

    object.position.set(0, 0, 0);
    object.scale.set(1, 1, 1);

  },

  function (xhr) {
    console.log((xhr.loaded / xhr.total * 100) + "% betöltve");
  },

  function (error) {
    console.error("OBJ hiba:", error);
  }
);

/* 📷 kamera */
camera.position.z = 3;

/* 🔄 animáció */
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
