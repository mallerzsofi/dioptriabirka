<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D + Galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  overflow-x: hidden;
}

/* 🟢 3D SZEKCIÓ */
#three-section {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* canvas */
canvas {
  display: block;
  pointer-events: none;
}

/* 🟤 MENÜ */
#menu {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px 0;
  text-align: center;

  font-family: Impact, sans-serif;
  font-size: 40px;
  color: #C1900B;

  background: rgba(255,255,255,0.95);

  opacity: 0;
  transform: translateY(-100%);
  transition: 0.4s;

  z-index: 9999;
}

#menu.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🖼 GALÉRIA */
#gallery {
  width: 95%;
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 0;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.image-wrapper {
  position: relative;
  cursor: pointer;
}

.image-wrapper img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

/* 💰 ár */
.price {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);

  font-family: Consolas, monospace;
  font-size: 14px;
  font-weight: 700;

  color: #3179ac;
  pointer-events: none;
}

/* 📱 responsive */
@media (max-width: 768px) {
  #gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 480px) {
  #gallery {
    grid-template-columns: repeat(1, 1fr);
  }
}
</style>
</head>

<body>

<div id="menu">MENÜ</div>

<div id="three-section"></div>

<!-- 🖼 GALÉRIA -->
<div id="gallery">

  <div class="image-wrapper"><img src="5.JPG"></div>
  <div class="image-wrapper"><img src="1.JPG"></div>
  <div class="image-wrapper"><img src="9.JPG"></div>

  <div class="image-wrapper"><img src="3.JPG"></div>
  <div class="image-wrapper"><img src="12.JPG"></div>
  <div class="image-wrapper"><img src="7.JPG"></div>

</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

/* 🎥 SCENE */
const section = document.getElementById("three-section");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
section.appendChild(renderer.domElement);

/* 💡 fény */
scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

/* 🎮 controls */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* 📦 3D model */
const loader = new THREE.GLTFLoader();

loader.load(
  "3DModel.glb",
  (gltf) => {
    scene.add(gltf.scene);
  },
  undefined,
  (err) => {
    console.log("❌ 3D ERROR:", err);
  }
);

camera.position.z = 3;

/* 🔄 render loop */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* 🟤 MENU scroll */
const menu = document.getElementById("menu");

window.addEventListener("scroll", () => {
  const bottom = section.getBoundingClientRect().bottom;

  if (bottom <= 0) {
    menu.classList.add("show");
  } else {
    menu.classList.remove("show");
  }
});

/* 📱 resize */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* =========================
   💰 ÁR RENDSZER
========================= */

function formatPrice(num) {
  return num.toLocaleString('hu-HU') + " ft";
}

function randomPriceRange() {
  const min = Math.floor(Math.random() * (120000 - 60000 + 1)) + 60000;
  const max = Math.floor(Math.random() * (120000 - 60000 + 1)) + 60000;

  const low = Math.min(min, max);
  const high = Math.max(min, max);

  return `${formatPrice(low)} - ${formatPrice(high)}`;
}

/* 🖱 click price */
document.querySelectorAll(".image-wrapper").forEach(wrapper => {
  wrapper.addEventListener("click", () => {
    const existing = wrapper.querySelector(".price");

    if (existing) {
      existing.remove();
    } else {
      const price = document.createElement("div");
      price.className = "price";
      price.innerText = randomPriceRange();
      wrapper.appendChild(price);
    }
  });
});

</script>

</body>
</html>
