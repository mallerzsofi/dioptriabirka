<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MENÜ</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  overflow-x: hidden;
}

#three-section {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

canvas {
  display: block;
  pointer-events: auto; /* 🔥 EZ A FIX */
}

#menu {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px 0;
  text-align: center;
  font-family: Impact, sans-serif;
  font-size: 40px;
  color: #C1900B;
  background: rgba(255,255,255,0.95);
  opacity: 0;
  transform: translateY(-100%);
  transition: 0.4s;
  z-index: 9999;
}

#menu.show {
  opacity: 1;
  transform: translateY(0);
}

#gallery {
  width: 95%;
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.image-wrapper {
  position: relative;
  cursor: pointer;
}

.image-wrapper img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

.price {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-family: Consolas, monospace;
  font-size: 14px;
  font-weight: 700;
  color: #3179ac;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="menu">MENÜ</div>
<div id="three-section"></div>

<div id="gallery">
  <div class="image-wrapper"><img src="13.JPG"></div>
  <div class="image-wrapper"><img src="1.JPG"></div>
  <div class="image-wrapper"><img src="9.JPG"></div>

  <div class="image-wrapper"><img src="3.JPG"></div>
  <div class="image-wrapper"><img src="12.JPG"></div>
  <div class="image-wrapper"><img src="7.JPG"></div>

  <div class="image-wrapper"><img src="8.JPG"></div>
  <div class="image-wrapper"><img src="2.JPG"></div>
  <div class="image-wrapper"><img src="11.JPG"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>

const section = document.getElementById("three-section");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
section.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

/* 🎮 FORGATÁS */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = true;
controls.enablePan = false;
controls.rotateSpeed = 0.8;

/* MODEL */
const loader = new THREE.GLTFLoader();

loader.load(
  "3DModel.obj.glb",
  (gltf) => {

    console.log("✔ MODEL BETÖLTVE");

    const model = gltf.scene;

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    model.scale.set(1,1,1);

    scene.add(model);
  },
  undefined,
  (err) => {
    console.error("❌ NEM TÖLTŐDIK:", err);
  }
);

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* MENU */
window.addEventListener("scroll", () => {
  const bottom = section.getBoundingClientRect().bottom;
  document.getElementById("menu").classList.toggle("show", bottom <= 0);
});

/* PRICE */
function randomPrice() {
  const value = Math.floor(Math.random() * (120000 - 60000 + 1)) + 60000;
  return value.toLocaleString('hu-HU') + " ft";
}

document.querySelectorAll(".image-wrapper").forEach(el => {
  el.addEventListener("click", () => {
    const p = el.querySelector(".price");
    if (p) p.remove();
    else {
      const d = document.createElement("div");
      d.className = "price";
      d.innerText = randomPrice();
      el.appendChild(d);
    }
  });
});

</script>

</body>
</html>
