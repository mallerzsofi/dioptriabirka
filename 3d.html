<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>3D + Galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

/* 🟢 3D SZEKCIÓ (FEHÉR HÁTTÉRREL) */
#three-section {
  position: relative;
  height: 100vh;
  background: white; /* 🔥 EZ A LÉNYEG */
  overflow: hidden;
}

/* 🎥 canvas */
canvas {
  display: block;
}

/* 🟤 MENÜ */
#menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

  padding: 15px 0;
  text-align: center;

  font-family: Impact, sans-serif;
  font-size: 40px;
  color: #C1900B;

  background: rgba(255,255,255,0.95);

  opacity: 0;
  transform: translateY(-100%);
  transition: 0.4s ease;

  z-index: 9999;
}

/* ✨ megjelenik */
#menu.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🖼 GALÉRIA */
#gallery {
  width: 90%;
  max-width: 1000px;
  margin: 0 auto;
  padding: 50px 0;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

#gallery img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}
</style>
</head>

<body>

<!-- 🟤 MENÜ -->
<div id="menu">MENÜ</div>

<!-- 🎥 3D SZEKCIÓ -->
<div id="three-section"></div>

<!-- 🖼 GALÉRIA -->
<div id="gallery">
  <img src="1.JPG">
  <img src="2.JPG">
  <img src="3.JPG">
  <img src="4.JPG">
  <img src="5.JPG">
  <img src="6.JPG">
  <img src="7.JPG">
  <img src="8.JPG">
  <img src="9.JPG">
  <img src="10.JPG">
  <img src="11.JPG">
  <img src="12.JPG">
  <img src="13.JPG">
  <img src="14.JPG">
</div>

<!-- 📦 THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const section = document.getElementById("three-section");

/* 🎥 renderer a sectionbe */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
section.appendChild(renderer.domElement);

/* 💡 fény */
scene.add(new THREE.AmbientLight(0xffffff, 1));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

/* 🎮 controls */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* 📦 3D */
const loader = new THREE.GLTFLoader();

loader.load("3DModel.obj.glb", function (gltf) {
  scene.add(gltf.scene);
});

/* 📷 kamera */
camera.position.z = 3;

/* 🔥 MENÜ LOGIKA (IGAZI LOGIKUS MEGOLDÁS) */
const menu = document.getElementById("menu");

window.addEventListener("scroll", () => {

  const sectionBottom = section.getBoundingClientRect().bottom;

  if (sectionBottom <= 0) {
    menu.classList.add("show"); // 🔥 csak ha vége a 3D-nek
  } else {
    menu.classList.remove("show");
  }

});

/* 🔄 loop */
function animate() {
  requestAnimationFrame(animate);

  controls.update();
  renderer.render(scene, camera);
}

animate();

/* 📱 resize */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
