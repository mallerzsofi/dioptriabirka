<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>KI AZ?</title>

<style>
body {
  margin: 0;
  background: white;
  font-family: Consolas;
  font-size: 20px;
  color: black;
  height: 100vh;
}

/* 📦 középre igazítás */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

/* 🖼 kép 500px */
img {
  width: 500px;
  display: block;
  cursor: pointer;
}

/* 📌 szöveg a kép fölött */
.text {
  margin-bottom: 10px; /* távolság a képtől */
}
</style>
</head>

<body>

<div class="container">

  <!-- 📌 szöveg -->
  <div class="text">ez vagyok én</div>

  <!-- 🖼 kép -->
  <img id="kep" src="en.JPG">

</div>

<!-- 🎵 zene -->
<audio id="zene" src="zene.mp3"></audio>

<script>
const kep = document.getElementById("kep");
const zene = document.getElementById("zene");

let playing = false;

kep.addEventListener("click", () => {

  if (!playing) {
    zene.play();
    playing = true;
  } else {
    window.location.href = "index.html";
  }

});
</script>

</body>
</html>
