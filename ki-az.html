<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ki az?</title>

<style>
body {
  margin: 0;
  background: white;
  font-family: Consolas;
  font-size: 20px;
  color: black;
  height: 100vh;
}

/* 📌 szöveg bal felső – KÉP FELETT */
.text {
  position: absolute;
  top: -30px; /* kép fölé tolja */
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

/* 🖼 kép középen */
.center-img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  cursor: pointer;
  z-index: 1; /* a szöveg alatt */
}
</style>
</head>

<body>

<!-- 📌 szöveg (kép fölött lesz) -->
<div class="text">ez vagyok én</div>

<!-- 🖼 kép -->
<img id="kep" class="center-img" src="en.JPG">

<!-- 🎵 zene -->
<audio id="zene" src="zene.mp3"></audio>

<script>
const kep = document.getElementById("kep");
const zene = document.getElementById("zene");

let playing = false;

kep.addEventListener("click", () => {

  if (!playing) {
    zene.play();
    playing = true;
  } else {
    window.location.href = "index.html";
  }

});
</script>

</body>
</html>
